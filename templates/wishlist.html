{% extends 'base.html' %}
{% block content %}

<h3>My Wishlist</h3>

<div class="row">
{% for item in items %}
<div class="col-md-3">
<div class="card">
<img src="{{ item.product.image.url }}" class="card-img-top">
<div class="card-body">
<h6>{{ item.product.name }}</h6>
<p>₹{{ item.product.price }}</p>

<a href="{% url 'product_detail' item.product.slug %}" class="btn btn-dark btn-sm">View</a>

<a href="{% url 'remove_wishlist' item.product.id %}" class="btn btn-danger btn-sm">Remove</a>
</div>
</div>
</div>
{% endfor %}
</div>

{% endblock %}
