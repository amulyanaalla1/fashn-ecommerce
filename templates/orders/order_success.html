{% extends "base.html" %}

{% block content %}

<style>

.success-box{
max-width:650px;
margin:auto;
background:white;
border-radius:10px;
padding:40px;
text-align:center;
box-shadow:0 5px 25px rgba(0,0,0,0.08);
}

.success-icon{
font-size:70px;
color:#28a745;
}

.order-details{
background:#f8f9fa;
padding:20px;
border-radius:8px;
margin-top:25px;
text-align:left;
}

.order-row{
display:flex;
justify-content:space-between;
margin-bottom:10px;
}

.btn-area{
margin-top:30px;
display:flex;
gap:15px;
justify-content:center;
}

</style>


<div class="container mt-5 mb-5">

<div class="success-box">

<div class="success-icon">
✔
</div>

<h2 class="mt-3">Order Placed Successfully!</h2>

<p class="text-muted">
Thank you for your purchase. Your order has been confirmed.
</p>

<div class="order-details">

<div class="order-row">
<strong>Order ID</strong>
<span>#{{ order.id }}</span>
</div>

<div class="order-row">
<strong>Date</strong>
<span>{{ order.created }}</span>
</div>

<div class="order-row">
<strong>Payment Method</strong>
<span>COD</span>
</div>

<div class="order-row">
<strong>Total Paid</strong>
<span>₹{{ order.total }}</span>
</div>

</div>


<div class="btn-area">

<a href="{% url 'my_orders' %}" class="btn btn-outline-dark">
View My Orders
</a>

<a href="{% url 'home' %}" class="btn btn-dark">
Continue Shopping
</a>

</div>

</div>

</div>

{% endblock %}
