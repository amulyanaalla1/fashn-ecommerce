{% extends "base.html" %}

{% block content %}

<div class="container mt-5" style="max-width:800px;"><div class="card shadow-sm">
<div class="card-body"><h4 class="mb-4">Add New Address</h4><form method="POST" action="{% url 'add_address' %}">
{% csrf_token %}<div class="row"><div class="col-md-6 mb-3">
<label class="form-label">Full Name</label>
<input type="text" name="full_name" class="form-control" placeholder="Full Name" required>
</div><div class="col-md-6 mb-3">
<label class="form-label">Phone Number</label>
<input type="text" name="phone" class="form-control" placeholder="Phone Number" required>
</div><div class="col-md-12 mb-3">
<label class="form-label">Street Address</label>
<input type="text" name="street" class="form-control" placeholder="House No / Street / Area" required>
</div><div class="col-md-4 mb-3">
<label class="form-label">City</label>
<input type="text" name="city" class="form-control" placeholder="City" required>
</div><div class="col-md-4 mb-3">
<label class="form-label">State</label>
<input type="text" name="state" class="form-control" placeholder="State">
</div><div class="col-md-4 mb-3">
<label class="form-label">Pincode</label>
<input type="text" name="pincode" class="form-control" placeholder="Pincode" required>
</div></div><button type="submit" class="btn btn-dark w-100">
Save Address
</button></form></div>
</div></div>{% endblock %}
